<!DOCTYPE html>
<html>
<head>
    <title>Restaurant Menu</title>
    <style>
        /* Basic Styling */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        .menu-item {
            border: 1px solid #ccc;
            padding: 15px;
            margin: 10px;
            border-radius: 5px;
            background-color: white;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
        button:hover {
            background-color: #45a049;
        }
        #cart {
            margin-top: 20px;
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: white;
        }
    </style>
</head>
<body>
    <h1>Welcome to My Restaurant!</h1>

    <!-- Menu Items -->
    <div class="menu-item">
        <h3>Pizza - ₹200</h3>
        <button onclick="addToCart('Pizza', 200)">Add to Cart</button>
    </div>

    <div class="menu-item">
        <h3>Burger - ₹150</h3>
        <button onclick="addToCart('Burger', 150)">Add to Cart</button>
    </div>

    <div class="menu-item">
        <h3>Pasta - ₹180</h3>
        <button onclick="addToCart('Pasta', 180)">Add to Cart</button>
    </div>

    <!-- और items डालें -->

    <!-- Cart Section -->
    <div id="cart">
        <h2>Your Cart</h2>
        <ul id="cart-items"></ul>
        <p>Total: ₹<span id="cart-total">0</span></p>
        <button onclick="checkout()">Checkout</button>
    </div>

    <script>
        let cart = [];
        let total = 0;

        // Function to add items to the cart
        function addToCart(item, price) {
            cart.push({ item, price });
            total += price;
            updateCartDisplay();
        }

        // Function to update the cart display
        function updateCartDisplay() {
            const cartItems = document.getElementById('cart-items');
            const cartTotal = document.getElementById('cart-total');

            // Clear the cart items list
            cartItems.innerHTML = '';

            // Add each item to the cart list
            cart.forEach((cartItem, index) => {
                const li = document.createElement('li');
                li.textContent = `${cartItem.item} - ₹${cartItem.price}`;
                cartItems.appendChild(li);
            });

            // Update the total price
            cartTotal.textContent = total;
        }

        // Function to handle checkout
        function checkout() {
            if (cart.length === 0) {
                alert('Your cart is empty!');
            } else {
                alert(`Thank you for your order! Total: ₹${total}`);
                cart = [];
                total = 0;
                updateCartDisplay();
            }
        }
    </script>
</body>
</html>
